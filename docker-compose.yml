services:
  schedule-postgres:
    image: postgres:15-alpine
    container_name: schedule-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - schedule_postgres_data:/var/lib/postgresql/data
    networks:
      - schedule-postgres-net

  schedule-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: schedule-bot
    restart: unless-stopped
    depends_on:
      - schedule-postgres
      - schedule-redis
      - schedule-migrations
    environment:
      DB_HOST: schedule-postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TOKEN: ${TOKEN}
      PROXY: ${PROXY}
      VLESS_PROXY: ${VLESS_PROXY}
      REDIS_HOST: schedule-redis
      REDIS_PORT: 6379
      ADMIN_ID: ${ADMIN_ID}
      SENTRY_DSN: ${SENTRY_DSN}
    networks:
      - schedule-postgres-net
      - schedule-redis-net

  schedule-redis:
    image: redis:7
    container_name: schedule-redis
    restart: unless-stopped
    networks:
      - schedule-redis-net

  schedule-migrations:
    container_name: schedule-migrations
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      DB_HOST: schedule-postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    command: poetry run alembic upgrade head
    depends_on:
      - schedule-postgres
    networks:
      - schedule-postgres-net

networks:
  schedule-postgres-net:
    driver: bridge
  schedule-redis-net:
    driver: bridge

volumes:
  schedule_postgres_data:
    name: schedule-postgres-data